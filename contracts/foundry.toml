[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
# Ronin (blockpick 패턴 — chainId 2020, legacy gas, ~20 gwei)
ronin = "https://api.roninchain.com/rpc"
ronin_saigon = "https://saigon-testnet.roninchain.com/rpc"
base_sepolia = "https://sepolia.base.org"
base_mainnet = "https://mainnet.base.org"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base_mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
